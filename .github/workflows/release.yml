name: Build & Release

on:
  push:
    tags:
      - "v*"         # triggers on version tags like v0.1.0, v1.2.3

  workflow_dispatch:  # allows manual trigger from the Actions tab

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Decky CLI
        run: |
          mkdir -p cli
          curl -L -o cli/decky \
            "https://github.com/SteamDeckHomebrew/cli/releases/latest/download/decky-linux-x86_64"
          chmod +x cli/decky

      - name: Install Python dependencies into py_modules
        run: bash scripts/install-py-deps.sh

      - name: Build plugin zip
        run: |
          sudo cli/decky plugin build -b -o out .

      - name: Validate build
        run: bash scripts/validate-build.sh

      - name: Determine zip filename
        id: zip
        run: |
          PLUGIN_NAME="$(python3 -c "import json; print(json.load(open('plugin.json'))['name'])")"
          ZIP_FILE="out/${PLUGIN_NAME}.zip"
          echo "path=${ZIP_FILE}" >> "$GITHUB_OUTPUT"
          echo "name=${PLUGIN_NAME}.zip" >> "$GITHUB_OUTPUT"
          echo "Plugin zip: ${ZIP_FILE}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ steps.zip.outputs.path }}

      # --- Release (only on tag push) ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.zip.outputs.path }}
